<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPIDER HUB // Scripts & Executores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top center, #3a050e 0%, #060204 100%);
        }
        .spider-glow {
            box-shadow: 0 0 35px -5px rgba(239, 68, 68, 0.4);
        }
        .neon-text {
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.7);
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen font-sans antialiased overflow-x-hidden">

    <div id="custom-toast" class="fixed bottom-5 right-5 bg-black/90 border border-red-500/30 text-white px-5 py-3 rounded-xl shadow-2xl font-mono text-xs transform translate-y-24 opacity-0 transition-all duration-300 z-50 flex items-center gap-3">
        <span class="text-red-500">✔</span> <span id="toast-message">Copiado con éxito</span>
    </div>

    <nav class="border-b border-red-500/10 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="text-2xl font-black tracking-widest text-red-500 hover:scale-105 transition-transform duration-200 cursor-pointer neon-text">
                SPIDER//HUB
            </div>
            <div class="flex items-center gap-2 px-4 py-1.5 rounded-full bg-red-500/10 border border-red-500/20 text-xs text-red-400 font-mono">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> SERVIDORES ONLINE
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-20 pb-12 flex flex-col items-center text-center relative">
        <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[700px] h-[450px] bg-red-600/10 rounded-full blur-[150px] pointer-events-none"></div>

        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-mono bg-red-500/10 text-red-400 border border-red-500/30 mb-6 tracking-widest">
            PANEL DE CONTROL // PRINCIPAL
        </span>

        <h1 class="text-5xl md:text-8xl font-black tracking-tighter mb-4 text-white uppercase select-none">
            SPIDER <span class="bg-clip-text text-transparent bg-gradient-to-r from-red-500 via-rose-600 to-red-700 neon-text">HUB</span>
        </h1>

        <p class="text-gray-300 text-base md:text-xl max-w-3xl mb-10 font-medium tracking-wide">
            Selecciona una categoría para ver los archivos disponibles.
        </p>

        <div class="flex bg-black/40 p-2 rounded-2xl border border-white/10 gap-2 z-10 w-full max-w-md mb-12">
            <button id="btn-tab-scripts" onclick="switchTab('scripts')" class="w-1/2 py-3 text-sm font-bold rounded-xl transition-all duration-300 bg-red-600 text-white spider-glow">
                📜 Ver Scripts
            </button>
            <button id="btn-tab-executors" onclick="switchTab('executors')" class="w-1/2 py-3 text-sm font-bold rounded-xl transition-all duration-300 text-gray-400 hover:text-white hover:bg-white/5">
                ⚙ Ejecutores
            </button>
        </div>
    </main>

    <section class="max-w-4xl mx-auto px-6 pb-24">
        
        <div id="section-scripts" class="block p-6 md:p-8 rounded-2xl bg-black/40 border border-white/[0.03] hover:border-red-500/20 transition-all duration-300">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-2xl font-bold text-white flex items-center gap-2">
                    <span class="text-red-500">&lt;/&gt;</span> Lista de Scripts
                </h3>
                <span class="px-2 py-1 bg-red-500/10 text-red-400 font-mono text-[10px] rounded uppercase font-bold tracking-wider">Online</span>
            </div>
            
            <div class="space-y-4">
                <div class="p-4 bg-white/[0.02] border border-white/[0.05] rounded-xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 hover:bg-white/[0.04] transition-all group">
                    <div>
                        <span class="font-mono text-sm text-white group-hover:text-red-400 transition-colors">SpiderHub.lua</span>
                        <p class="text-xs text-gray-500 mt-1">Auto-Farm, Teletransporte y selección de misiones.</p>
                    </div>
                    <input type="text" id="code-spider" class="hidden" value='loadstring(game:HttpGet("https://gist.githubusercontent.com/israelccc/04288b107da073b84f5d05d665cb64b3/raw/SpiderHUB.DUELS.lua"))()'>
                    <button onclick="copyScript('code-spider', '¡Script de SpiderHub copiado!')" class="w-full sm:w-auto text-xs font-bold bg-red-500/10 text-red-400 border border-red-500/20 px-4 py-2 rounded-lg
